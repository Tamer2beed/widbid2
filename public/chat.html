<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WidBid</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<!-- CSS -->
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/chat.css">
<link rel="stylesheet" href="/css/admin.css">
<style>
/* ══ SETTINGS PANEL ══ */
.settings-overlay {
  position:fixed; inset:0; z-index:190;
  background:rgba(0,0,0,.45); display:none;
}
.settings-overlay.show { display:block; }

.settings-panel {
  position:fixed; bottom:0; left:0; right:0;
  z-index:191;
  background:#fff;
  border-radius:20px 20px 0 0;
  padding:0 0 30px;
  max-height:85vh;
  overflow-y:auto;
  transform:translateY(100%);
  transition:transform .25s ease;
}
.settings-panel.show { transform:translateY(0); }

.settings-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 20px 12px;
  border-bottom:1px solid #f0f0f0;
  font-size:16px; font-weight:700; color:#333;
}
.settings-close {
  font-size:18px; color:#999; cursor:pointer; padding:4px 8px;
}
.settings-section {
  padding:14px 20px;
  border-bottom:1px solid #f5f5f5;
}
.settings-label {
  font-size:12px; color:#999; font-weight:600;
  margin-bottom:10px; text-transform:uppercase; letter-spacing:.5px;
}
.settings-profile-row {
  display:flex; align-items:center; gap:14px;
}
.settings-avatar-wrap {
  position:relative; cursor:pointer;
  width:64px; height:64px; flex-shrink:0;
}
.settings-avatar-img {
  width:64px; height:64px;
  border-radius:12px;
  border:3px solid #6C63FF;
  object-fit:cover;
}
.settings-avatar-edit {
  position:absolute; bottom:-4px; right:-4px;
  background:#6C63FF; color:#fff;
  border-radius:50%; width:22px; height:22px;
  display:flex; align-items:center; justify-content:center;
  font-size:11px;
}
.settings-profile-info { flex:1; }
.settings-username {
  font-size:16px; font-weight:700; color:#222; margin-bottom:8px;
}
.settings-btn-avatar {
  background:#6C63FF22; color:#6C63FF;
  border:none; border-radius:8px;
  padding:7px 14px; font-size:13px; font-weight:600;
  cursor:pointer;
}
.settings-status-grid {
  display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
}
.ssg-item {
  background:#f7f7ff; border-radius:10px;
  padding:8px 4px; text-align:center;
  font-size:12px; cursor:pointer;
  transition:background .1s;
}
.ssg-item:active { background:#e8e8ff; }
.settings-btn-danger {
  width:100%; padding:12px;
  background:#fff0f0; color:#e53935;
  border:1px solid #ffcdd2; border-radius:10px;
  font-size:14px; font-weight:600; cursor:pointer;
}

/* ══ SIDE MENU — Wevo Style ══ */
/* ══ SIDE MENU — Wevo Style ══ */
.side-menu {
  position   : fixed;
  top        : 0; right: 0;
  width      : 75vw; max-width: 290px;
  height     : 100vh;
  background : #fff;
  z-index    : 120;
  transform  : translateX(100%);
  transition : transform .28s cubic-bezier(.4,0,.2,1);
  overflow-y : auto;
  padding-bottom: 32px;
  box-shadow : -4px 0 28px rgba(0,0,0,.14);
  direction  : rtl;
}
.side-menu.open { transform: translateX(0); }

/* ── الملف الشخصي أعلى القائمة ── */
.sm-profile {
  display    : flex;
  align-items: center;
  gap        : 12px;
  padding    : 52px 18px 18px;
  background : linear-gradient(135deg, var(--wevo-top,#0099CC), var(--wevo-dark,#1a2a5e));
}
.sm-avatar {
  width        : 52px; height: 52px;
  border-radius: 12px;
  border       : 2.5px solid rgba(255,255,255,.6);
  object-fit   : cover;
  flex-shrink  : 0;
}
.sm-profile-info { flex: 1; }
.sm-username {
  font-size  : 15px; font-weight: 700; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sm-rank-label { font-size: 12px; color: rgba(255,255,255,.7); margin-top: 2px; }

/* ── العناصر ── */
.sm-item {
  display    : flex;
  align-items: center;
  gap        : 14px;
  padding    : 15px 18px;
  cursor     : pointer;
  transition : background .1s;
  direction  : rtl;
}
.sm-item:active { background: #f5f5fa; }
.sm-danger .sm-label { color: #E53935; }

.sm-icon  { font-size: 20px; width: 26px; text-align: center; flex-shrink: 0; }
.sm-label { flex: 1; font-size: 15px; font-weight: 600; color: #222; }
.sm-arrow { color: #ccc; font-size: 18px; font-weight: 300; }

.sm-divider      { height: 1px; background: #f0f0f0; margin: 4px 0; }
.sm-section-label {
  padding    : 10px 18px 4px;
  font-size  : 11px; color: #aaa;
  font-weight: 700; letter-spacing: .5px;
  text-align : right;
}


/* ══ AVATAR PICKER ══ */
let _selectedAv = null;

function openAvatarPicker() {
  const overlay = document.getElementById('avatarPickerOverlay');
  overlay.classList.add('show');
  /* أظهر زر الرفع للحسابات المدفوعة */
  const hasPaid = window._userHasPaidProfile || false;
  document.getElementById('avatarUploadBtn').style.display = hasPaid ? 'block' : 'none';
}

function closeAvatarPicker() {
  document.getElementById('avatarPickerOverlay').classList.remove('show');
}

function selectAvatar(el) {
  document.querySelectorAll('.avatar-option').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  _selectedAv = el.dataset.av;
  /* حفظ مباشرة */
  fetch('/api/users/avatar/default', {
    method : 'PUT',
    headers: { 'Content-Type':'application/json',
               'Authorization':'Bearer ' + localStorage.getItem('token') },
    body   : JSON.stringify({ avatar: _selectedAv }),
  })
  .then(r => r.json())
  .then(d => {
    if (d.success) {
      showToast('✅ تم تغيير الصورة');
      /* حدّث صورتك في القائمة فوراً */
      if (typeof updateMemberStatusDot === 'function') {
        document.querySelectorAll(
          `.member-avatar-img`
        ).forEach(img => {
          const item = img.closest('.member-item');
          if (item?.dataset.username === localStorage.getItem('username'))
            img.src = '/avatars/' + _selectedAv;
        });
      }
      closeAvatarPicker();
    }
  })
  .catch(() => showToast('❌ فشل تغيير الصورة'));
}

function triggerAvatarUpload() {
  document.getElementById('avatarFileInput').click();
}

function handleAvatarFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 500 * 1024) { showToast('⛔ الصورة أكبر من 500KB'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    const base64 = ev.target.result;
    fetch('/api/users/avatar/upload', {
      method : 'PUT',
      headers: { 'Content-Type':'application/json',
                 'Authorization':'Bearer ' + localStorage.getItem('token') },
      body   : JSON.stringify({ imageData: base64 }),
    })
    .then(r => r.json())
    .then(d => {
      if (d.success) {
        showToast('✅ تم رفع الصورة');
        document.querySelectorAll('.member-avatar-img').forEach(img => {
          const item = img.closest('.member-item');
          if (item?.dataset.username === localStorage.getItem('username'))
            img.src = base64;
        });
        closeAvatarPicker();
      } else {
        showToast(d.message || '❌ فشل الرفع');
      }
    });
  };
  reader.readAsDataURL(file);
}
</script>

</body>
</html>
